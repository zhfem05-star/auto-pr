name: 🧪 AI Test Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - develop

permissions:
  pull-requests: write
  contents: read
  statuses: write   # 커밋 상태 업데이트용

jobs:
  test-and-analyze:
    name: Test & AI Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 프로젝트 의존성 설치 ──────────────────────────────────
      - name: Install project dependencies
        run: |
          pip install -r requirements.txt || echo "requirements.txt 없음, 스킵"

      - name: Install agent dependencies
        run: pip install anthropic requests pytest pytest-cov

      # ── 테스트 실행 (결과를 파일에 저장) ─────────────────────
      - name: Run pytest
        id: pytest
        run: |
          python -m pytest tests/ -v --tb=short --no-header 2>&1 | tee test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true  # 실패해도 다음 단계 진행 (AI 분석 위해)

      # ── AI 분석 실행 ──────────────────────────────────────────
      - name: AI Test Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          # PR 이벤트일 때만 PR_NUMBER 설정
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TEST_OUTPUT_FILE: test_output.txt
        run: python scripts/test_agent.py

      # ── 최종 exit code 반환 ───────────────────────────────────
      # (테스트 실패 시 워크플로우 자체도 실패로 표시)
      - name: Check test result
        if: steps.pytest.outputs.exit_code != '0'
        run: exit 1
